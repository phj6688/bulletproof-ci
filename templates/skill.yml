name: CI

on:
  pull_request:
    branches: [__BRANCHES__]
  push:
    branches: [__BRANCHES__]
  workflow_dispatch:

# One run per ref; new pushes cancel superseded runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-skill:
    name: Validate skill & manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate SKILL.md & plugin manifests
        run: |
          python - <<'PY'
          import sys, json, yaml
          from pathlib import Path

          # rglob descends into hidden dirs (e.g. .claude-plugin/), unlike glob.glob('**').
          def find(name):
              return [p for p in Path('.').rglob(name) if '.git' not in p.parts]

          skills = find('SKILL.md')
          plugins = find('plugin.json')
          markets = find('marketplace.json')
          bad = 0

          for path in skills:
              text = path.read_text(encoding='utf-8')
              if not text.startswith('---'):
                  print(f"::error file={path}::missing YAML frontmatter")
                  bad += 1; continue
              try:
                  data = yaml.safe_load(text.split('---', 2)[1]) or {}
              except Exception as e:
                  print(f"::error file={path}::invalid frontmatter YAML: {e}")
                  bad += 1; continue
              for key in ('name', 'description'):
                  if not data.get(key):
                      print(f"::error file={path}::frontmatter missing '{key}'")
                      bad += 1
              print(f"OK: {path}")

          for path in plugins + markets:
              try:
                  data = json.loads(path.read_text(encoding='utf-8'))
              except Exception as e:
                  print(f"::error file={path}::invalid JSON: {e}")
                  bad += 1; continue
              # marketplace.json describes plugins, not itself; only require name/description on plugin.json.
              if path.name == 'plugin.json':
                  for key in ('name', 'description'):
                      if not data.get(key):
                          print(f"::error file={path}::manifest missing '{key}'")
                          bad += 1
              print(f"OK: {path}")

          if not skills and not plugins and not markets:
              print("::error::no SKILL.md or plugin/marketplace manifest found anywhere in the repo")
              bad += 1

          sys.exit(1 if bad else 0)
          PY

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run shellcheck on scripts
        run: |
          mapfile -t files < <(git ls-files '*.sh' 'bin/*')
          # keep only shell scripts among bin/* (by shebang)
          shell_files=()
          for f in "${files[@]}"; do
            case "$f" in
              *.sh) shell_files+=("$f") ;;
              *) head -1 "$f" 2>/dev/null | grep -qE '^#!.*(bash|sh)' && shell_files+=("$f") ;;
            esac
          done
          if [ ${#shell_files[@]} -eq 0 ]; then
            echo "No shell scripts; skipping shellcheck (gate stays green)."
            exit 0
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          printf '%s\n' "${shell_files[@]}"
          shellcheck "${shell_files[@]}"

  markdownlint:
    name: Markdown (lenient)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: markdownlint (non-blocking style, blocking parse)
        run: |
          mapfile -t md < <(git ls-files '*.md')
          if [ ${#md[@]} -eq 0 ]; then
            echo "No markdown files."
            exit 0
          fi
          for f in "${md[@]}"; do
            if [ ! -s "$f" ]; then echo "::error::empty markdown: $f"; exit 1; fi
          done
          npx --yes markdownlint-cli2 "**/*.md" "#node_modules" || \
            echo "::warning::markdownlint reported style issues (non-blocking)."

  ci-passed:
    name: __GATE_NAME__
    if: always()
    needs: [validate-skill, shellcheck, markdownlint]
    runs-on: ubuntu-latest
    steps:
      - name: Require every job to pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "::error::A required CI job did not succeed."
          echo "Results: ${{ join(needs.*.result, ' ') }}"
          exit 1
      - name: All gates green
        run: echo "All CI jobs passed."
